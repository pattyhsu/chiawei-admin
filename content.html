<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>家偉補習班 · 內容行銷台</title>
<!-- 內容行銷台 — hand-written (unlike receipt.html, which is GENERATED by
     chiawei/scripts/build_receipt.py; do not confuse the two).

     Load order is load-bearing: auth.js hides <body> at parse time and this
     page's init() must not run until authGate() reaches a verdict.

     This page shows REAL DATA, including student names on a 榜單 — which the
     other pages here do not. The client-side gate is NOT what protects it:
     every read and write goes to Supabase under the anon key, and RLS
     (owner/admin only) is the boundary. Same posture as backstage. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sb.js"></script>
<script src="auth.js"></script>
<style>
:root {
  /* Brand palette (chiawei CLAUDE.md): 寶藍 primary, 黃/橘 accents.
     Copied per-page, matching login.html — this repo has no shared stylesheet. */
  --brand: #2547c7;
  --brand-yellow: #f8c414;
  --brand-orange: #ef5226;
  --bg: #f6f7fb;
  --surface: #fff;
  --ink: #1b1f2a;
  --muted: #6b7280;
  --line: #e3e6ee;
  --danger: #c0362c;
  --ok: #1e7d46;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  color: var(--ink);
  background: var(--bg);
  font-family: "PingFang TC", "Noto Sans TC", system-ui, -apple-system, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
header {
  display: flex; align-items: center; gap: 16px;
  padding: 10px 16px; background: var(--surface);
  border-bottom: 2px solid var(--brand);
  position: sticky; top: 0; z-index: 5; flex-wrap: wrap;
}
header .brand { font-weight: 700; color: var(--brand); }
header .spacer { flex: 1; }
header .who { font-size: 13px; color: var(--muted); }
nav { display: flex; gap: 4px; }
nav button {
  font: inherit; font-size: 14px; cursor: pointer;
  border: 1px solid transparent; border-radius: 8px;
  background: none; color: var(--muted); padding: 6px 12px; font-weight: 600;
}
nav button.on { background: #eef1fc; color: var(--brand); }
main { max-width: 900px; margin: 0 auto; padding: 20px 16px 80px; }
h2 { font-size: 20px; margin: 0 0 4px; }
.muted { color: var(--muted); font-size: 13px; margin: 0 0 16px; line-height: 1.6; }
button, .btn {
  font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--line); border-radius: 8px;
  background: var(--brand); color: #fff; padding: 7px 13px;
  text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
}
.btn.ghost, button.ghost { background: #fff; color: var(--ink); }
.btn.ok, button.ok { background: var(--ok); border-color: var(--ok); }
.btn.warn, button.warn { background: var(--brand-orange); border-color: var(--brand-orange); }
.btn.danger, button.danger { background: #fff; color: var(--danger); border-color: var(--danger); }
button:disabled { opacity: .5; cursor: default; }
.chip {
  display: inline-block; font-size: 12px; font-weight: 700;
  border-radius: 999px; padding: 3px 9px; background: #eef1fc; color: var(--brand);
}
.chip.draft { background: #f1f2f5; color: var(--muted); }
.chip.approved { background: #e5f4ea; color: var(--ok); }
.chip.posted { background: var(--brand); color: #fff; }
.chip.rejected, .chip.err { background: #fdeae3; color: var(--danger); }
.chip.sample { background: #fef6da; color: #8a6a00; }
.chip.consent { background: #e5f4ea; color: var(--ok); }
.day { margin-top: 26px; }
.day h3 {
  font-size: 14px; color: var(--muted); font-weight: 600;
  border-bottom: 1px solid var(--line); padding-bottom: 6px; margin: 0;
}
.day h3 .today {
  margin-left: 8px; font-size: 11px; color: #fff;
  background: var(--brand-orange); border-radius: 999px; padding: 2px 7px;
}
.item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px dashed var(--line); }
.thumb {
  width: 132px; height: 132px; flex: 0 0 132px; object-fit: cover;
  border: 1px solid var(--line); border-radius: 10px; background: #fff;
}
.thumb.pending {
  display: grid; place-items: center; font-size: 12px; color: var(--muted);
  text-align: center; padding: 8px; line-height: 1.5;
}
.body { flex: 1; min-width: 0; }
.meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.meta b { font-size: 15px; }
.err {
  color: var(--danger); font-size: 12px; margin: 6px 0 0;
  background: #fdeae3; border-radius: 6px; padding: 6px 9px; line-height: 1.5;
}
textarea, input[type=text], input[type=date], input[type=number], select {
  font: inherit; font-size: 13px; width: 100%;
  border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px;
  background: #fff; color: var(--ink);
}
textarea { resize: vertical; margin-top: 8px; line-height: 1.6; }
.acts { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 9px; }
.card {
  border: 1px solid var(--line); border-radius: 10px; background: #fff;
  padding: 13px 15px; margin-top: 12px;
}
.card.used { opacity: .6; }
.row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
label.fld { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--muted); }
label.fld.grow { flex: 1; min-width: 140px; }
.consent {
  border: 1px solid var(--brand-yellow); background: #fef6da55;
  border-radius: 10px; padding: 12px 14px; display: flex;
  flex-direction: column; gap: 10px;
}
.chk { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink); }
.chk input { width: auto; }
.hide { display: none !important; }
.empty { color: var(--muted); font-size: 14px; margin-top: 30px; line-height: 1.7; }
@media (max-width: 640px) {
  .item { flex-direction: column; }
  .thumb, .thumb.pending { width: 100%; height: auto; aspect-ratio: 1; flex: none; }
}
</style>
</head>
<body>
<header>
  <span class="brand">家偉補習班 · 內容行銷台</span>
  <nav>
    <button data-tab="queue" class="on">佇列</button>
    <button data-tab="bank">文案庫</button>
    <button data-tab="compose">新貼文</button>
  </nav>
  <span class="spacer"></span>
  <span class="who" id="who"></span>
  <a class="btn ghost" href="index.html">後台首頁</a>
  <button type="button" class="ghost" id="btn-signout">登出</button>
</header>

<main>
  <!-- ── 佇列 ─────────────────────────────────────────────────────────── -->
  <section id="tab-queue">
    <h2>佇列</h2>
    <p class="muted">
      每天早上自動產生的貼文草稿會出現在這裡。預覽 → 改文案 → 核准 → 下載圖片、
      複製文案 → 貼到 FB / IG / LINE → 回來按「標記已發布」。
    </p>
    <div id="queue"></div>
  </section>

  <!-- ── 文案庫 ───────────────────────────────────────────────────────── -->
  <section id="tab-bank" class="hide">
    <h2>文案庫</h2>
    <p class="muted">
      學習技巧（週一／四）、會考情報（週二）的存貨。<b>只有「已審核」的會被每日排程拿去發</b> ——
      沒有存貨的那天就不發文，這是刻意的。
    </p>
    <p class="muted" id="bank-stock"></p>
    <div id="bank"></div>
  </section>

  <!-- ── 新貼文 ───────────────────────────────────────────────────────── -->
  <section id="tab-compose" class="hide">
    <h2>新貼文</h2>
    <p class="muted">
      建立後卡片由伺服器產生，大約 2–3 分鐘後出現在佇列裡（這台是靜態網頁，畫不了圖）。
      真實學生資料（榜單／見證／躍升卡）必須填家長書面同意編號，或勾選「示意資料」。
    </p>
    <div id="compose"></div>
  </section>
</main>

<script>
// ── constants ───────────────────────────────────────────────────────────────
const BUCKET = "content-cards";
const TYPE_LABEL = {
  tip: "學習技巧", exam_info: "會考情報", honor_roll: "榜單", event: "活動",
  testimonial_parent: "家長見證", testimonial_student: "學生見證", leap_card: "躍升卡",
};
const STATUS_LABEL = { draft: "草稿", approved: "已核准", posted: "已發布", rejected: "已退回" };
const BANK_KIND = { tip: "學習技巧", exam_info: "會考情報" };
const BANK_STATUS = { draft: "待審核", reviewed: "已審核", used: "已使用" };
const PII_TYPES = ["honor_roll", "testimonial_parent", "testimonial_student", "leap_card"];

const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const todayTaipei = () =>
  new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Taipei" }).format(new Date());

let ITEMS = [], BANK = [], POLL = null;

// ── tabs ────────────────────────────────────────────────────────────────────
document.querySelectorAll("nav button").forEach((b) => {
  b.addEventListener("click", () => {
    document.querySelectorAll("nav button").forEach((x) => x.classList.toggle("on", x === b));
    ["queue", "bank", "compose"].forEach((t) =>
      document.getElementById("tab-" + t).classList.toggle("hide", t !== b.dataset.tab));
  });
});

// ── 佇列 ────────────────────────────────────────────────────────────────────
async function loadQueue() {
  const { data, error } = await window.sb
    .from("content_items")
    .select("*")
    .order("scheduled_date", { ascending: false })
    .order("created_at", { ascending: true });
  if (error) { document.getElementById("queue").innerHTML =
    `<p class="empty">讀取失敗：${esc(error.message)}</p>`; return; }
  ITEMS = data || [];
  await renderQueue();
}

async function renderQueue() {
  const el = document.getElementById("queue");
  if (!ITEMS.length) {
    el.innerHTML = `<p class="empty">目前沒有貼文草稿。<br>
      每週一／四早上自動產學習技巧、週二產會考情報（需要文案庫有「已審核」存貨）；
      或到「新貼文」手動建立。</p>`;
    return;
  }
  const today = todayTaipei();
  const days = [...new Set(ITEMS.map((i) => i.scheduled_date))];
  el.innerHTML = days.map((d) => `
    <section class="day">
      <h3>${esc(d)}${d === today ? '<span class="today">今天</span>' : ""}</h3>
      ${ITEMS.filter((i) => i.scheduled_date === d).map(itemHtml).join("")}
    </section>`).join("");
  await fillThumbs();
}

function itemHtml(it) {
  const pending = !it.image_keys || it.image_keys.length === 0;
  return `
  <article class="item" data-id="${it.id}">
    ${pending
      ? `<div class="thumb pending">${it.render_error ? "產圖失敗" : "卡片產生中…<br>約 2–3 分鐘"}</div>`
      : `<img class="thumb" data-path="${esc(it.image_keys[0])}" alt="${esc(it.title)}">`}
    <div class="body">
      <div class="meta">
        <span class="chip">${esc(TYPE_LABEL[it.type] || it.type)}</span>
        <span class="chip ${it.status}">${esc(STATUS_LABEL[it.status])}</span>
        ${it.sample_data ? '<span class="chip sample">示意資料</span>' : ""}
        ${it.consent_ref ? `<span class="chip consent">同意編號 ${esc(it.consent_ref)}</span>` : ""}
        <b>${esc(it.title)}</b>
      </div>
      ${it.render_error ? `<p class="err">產圖失敗：${esc(it.render_error)}</p>` : ""}
      <textarea rows="4" data-caption>${esc(it.caption)}</textarea>
      <div class="acts">
        <button class="ghost" data-act="save">儲存文案</button>
        <button class="ghost" data-act="copy">複製文案</button>
        ${pending ? "" : `<button class="ghost" data-act="download">下載圖片</button>`}
        <button class="ghost" data-act="rerender">重新產圖</button>
        ${it.status === "draft" ? `<button class="ok" data-act="approve">核准</button>
          <button class="ghost" data-act="reject">退回</button>` : ""}
        ${it.status !== "posted" ? `<button class="warn" data-act="posted">標記已發布</button>` : ""}
        ${it.post_url ? `<a class="btn ghost" href="${esc(it.post_url)}" target="_blank" rel="noreferrer">查看貼文</a>` : ""}
        ${it.status !== "posted" ? `<button class="danger" data-act="delete">刪除</button>` : ""}
      </div>
    </div>
  </article>`;
}

// Cards are in a PRIVATE bucket: fetch a short-lived signed URL per image.
async function fillThumbs() {
  const imgs = [...document.querySelectorAll("img.thumb[data-path]")];
  if (!imgs.length) return;
  const { data } = await window.sb.storage.from(BUCKET)
    .createSignedUrls(imgs.map((i) => i.dataset.path), 300);
  (data || []).forEach((r, n) => { if (r.signedUrl) imgs[n].src = r.signedUrl; });
}

document.getElementById("queue").addEventListener("click", async (e) => {
  const btn = e.target.closest("button[data-act]");
  if (!btn) return;
  const art = btn.closest(".item");
  const it = ITEMS.find((i) => i.id === art.dataset.id);
  const caption = art.querySelector("[data-caption]").value;
  const act = btn.dataset.act;
  btn.disabled = true;
  try {
    if (act === "copy") {
      await navigator.clipboard.writeText(caption);
      btn.textContent = "已複製 ✓";
      setTimeout(() => (btn.textContent = "複製文案"), 1500);
      return;
    }
    if (act === "download") return download(it);
    if (act === "save")     return void (await patch(it.id, { caption }));
    if (act === "approve")  return void (await patch(it.id, { status: "approved" }));
    if (act === "reject")   return void (await patch(it.id, { status: "rejected" }));
    // Clearing image_keys is what asks the server for a fresh card (a DB
    // trigger dispatches the render job) — see the migration for why.
    if (act === "rerender") return void (await patch(it.id, { image_keys: [], render_error: null }));
    if (act === "posted") {
      const url = prompt("貼文網址（可留空）") ?? "";
      return void (await patch(it.id, {
        status: "posted", posted_at: new Date().toISOString(), post_url: url.trim() || null }));
    }
    if (act === "delete") {
      if (!confirm("刪除這筆草稿？")) return;
      const { error } = await window.sb.from("content_items").delete().eq("id", it.id);
      if (error) alert("刪除失敗：" + error.message);
      return void (await loadQueue());
    }
  } finally {
    btn.disabled = false;
  }
});

async function patch(id, fields) {
  const { error } = await window.sb.from("content_items").update(fields).eq("id", id);
  if (error) { alert("儲存失敗：" + error.message); return; }
  await loadQueue();
}

async function download(it) {
  const path = it.image_keys[0];
  const { data, error } = await window.sb.storage.from(BUCKET).download(path);
  if (error) { alert("下載失敗：" + error.message); return; }
  const a = document.createElement("a");
  a.href = URL.createObjectURL(data);
  a.download = `${it.type}-${it.scheduled_date}.png`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── 文案庫 ──────────────────────────────────────────────────────────────────
async function loadBank() {
  const { data, error } = await window.sb
    .from("content_bank").select("*")
    .order("status", { ascending: true }).order("created_at", { ascending: true });
  if (error) { document.getElementById("bank").innerHTML =
    `<p class="empty">讀取失敗：${esc(error.message)}</p>`; return; }
  BANK = data || [];
  const n = (k) => BANK.filter((b) => b.kind === k && b.status === "reviewed").length;
  document.getElementById("bank-stock").innerHTML =
    `存貨：學習技巧 <b>${n("tip")}</b> 則已審核 · 會考情報 <b>${n("exam_info")}</b> 則已審核`;
  document.getElementById("bank").innerHTML = BANK.map((b) => `
    <div class="card ${b.status === "used" ? "used" : ""}" data-id="${b.id}">
      <div class="meta">
        <span class="chip">${esc(BANK_KIND[b.kind] || b.kind)}</span>
        <span class="chip ${b.status === "reviewed" ? "approved" : b.status === "used" ? "posted" : "draft"}">
          ${esc(BANK_STATUS[b.status])}</span>
      </div>
      <textarea rows="1" data-f="title">${esc(b.title)}</textarea>
      <textarea rows="3" data-f="body">${esc(b.body)}</textarea>
      <textarea rows="2" data-f="caption" placeholder="貼文文案（留空 = 自動套模板）">${esc(b.caption || "")}</textarea>
      <div class="acts">
        <button class="ghost" data-act="save">儲存</button>
        ${b.status === "draft" ? `<button class="ok" data-act="review">審核通過</button>` : ""}
        ${b.status === "reviewed" ? `<button class="ghost" data-act="unreview">退回待審</button>` : ""}
        ${b.status !== "used" ? `<button class="danger" data-act="delete">刪除</button>` : ""}
      </div>
    </div>`).join("") || `<p class="empty">文案庫是空的。批次撰寫請在 Claude Code 跑
      <code>/author-content</code>，匯入後回來審核。</p>`;
}

document.getElementById("bank").addEventListener("click", async (e) => {
  const btn = e.target.closest("button[data-act]");
  if (!btn) return;
  const card = btn.closest(".card");
  const id = card.dataset.id;
  const get = (f) => card.querySelector(`[data-f="${f}"]`).value;
  btn.disabled = true;
  try {
    if (btn.dataset.act === "delete") {
      if (!confirm("刪除這則文案？")) return;
      const { error } = await window.sb.from("content_bank").delete().eq("id", id);
      if (error) alert("刪除失敗（可能已被貼文使用）：" + error.message);
    } else {
      const fields = btn.dataset.act === "save"
        ? { title: get("title"), body: get("body"), caption: get("caption") || null }
        : { status: btn.dataset.act === "review" ? "reviewed" : "draft" };
      const { error } = await window.sb.from("content_bank").update(fields).eq("id", id);
      if (error) alert("儲存失敗：" + error.message);
    }
    await loadBank();
  } finally {
    btn.disabled = false;
  }
});

// ── 新貼文 ──────────────────────────────────────────────────────────────────
const FORMS = {
  honor_roll: () => `
    <div class="row">
      <label class="fld">年度（民國）<input type="text" data-p="year_roc" value="115" style="width:90px"></label>
      <label class="fld grow">主標<input type="text" data-p="headline" placeholder="會考放榜，實力說話"></label>
    </div>
    <div id="students"></div>
    <button class="ghost" id="add-student">＋ 加一位</button>
    <label class="fld">備註<input type="text" data-p="note"></label>`,
  event: () => `
    <div class="row">
      <label class="fld grow">活動名稱<input type="text" data-p="event_name"></label>
      <label class="fld">日期時間<input type="text" data-p="date_text" placeholder="8/12（三）19:00"></label>
    </div>
    <div class="row">
      <label class="fld grow">地點<input type="text" data-p="place"></label>
      <label class="fld grow">一句話說明<input type="text" data-p="body"></label>
      <label class="fld">行動呼籲<input type="text" data-p="cta" placeholder="私訊報名 · 名額有限"></label>
    </div>`,
  testimonial_parent: () => TESTIMONIAL(),
  testimonial_student: () => TESTIMONIAL(),
  leap_card: () => `
    <div class="row">
      <label class="fld">學生<input type="text" data-p="student" placeholder="王同學"></label>
      <label class="fld">科目<input type="text" data-p="subject" value="數學"></label>
      <label class="fld">期間<input type="text" data-p="period" placeholder="國二下學期"></label>
      <label class="fld">前<input type="number" data-p="before" style="width:80px"></label>
      <label class="fld">後<input type="number" data-p="after" style="width:80px"></label>
    </div>
    <p class="muted">軌跡至少 3 點；<b>首尾分數必須等於前／後</b>（誠實檢核，對不上伺服器會拒絕產圖）。
      等級：0 待加強 · 1 進行中 · 2 接近精熟 · 3 精熟</p>
    <div id="traj"></div>
    <button class="ghost" id="add-traj">＋ 加一點</button>`,
};
const TESTIMONIAL = () => `
  <label class="fld">見證內容<textarea rows="3" data-p="quote"></textarea></label>
  <div class="row">
    <label class="fld grow">署名<input type="text" data-p="attribution" placeholder="國二家長"></label>
    <label class="fld grow">補充<input type="text" data-p="context" placeholder="入班八個月"></label>
  </div>`;

function studentRow() {
  return `<div class="row" data-student>
    <label class="fld grow">姓名（去識別化，例：王○安）<input type="text" data-s="name"></label>
    <label class="fld grow">錄取學校<input type="text" data-s="school"></label>
    <button class="ghost" data-rm>移除</button></div>`;
}
function trajRow(label = "", score = "", level = "0") {
  return `<div class="row" data-traj>
    <label class="fld">標籤<input type="text" data-t="label" value="${label}" placeholder="3月" style="width:90px"></label>
    <label class="fld">分數<input type="number" data-t="score" value="${score}" style="width:90px"></label>
    <label class="fld">等級<select data-t="level">
      ${[0, 1, 2, 3].map((l) => `<option value="${l}"${String(l) === level ? " selected" : ""}>${l}</option>`).join("")}
    </select></label>
    <button class="ghost" data-rm>移除</button></div>`;
}

function renderCompose() {
  document.getElementById("compose").innerHTML = `
    <div class="row">
      <label class="fld">類型<select id="c-type">
        ${Object.entries(TYPE_LABEL).filter(([t]) => FORMS[t])
          .map(([t, l]) => `<option value="${t}">${l}</option>`).join("")}
      </select></label>
      <label class="fld">排程日期<input type="date" id="c-date" value="${todayTaipei()}"></label>
      <label class="fld grow">內部標題（佇列顯示用）<input type="text" id="c-title" placeholder="例：115 會考放榜"></label>
    </div>
    <div id="c-form" class="card"></div>
    <label class="fld">貼文文案（可留空之後再改）<textarea rows="4" id="c-caption"></textarea></label>
    <div class="consent hide" id="c-consent">
      <label class="chk"><input type="checkbox" id="c-sample"> 示意資料（虛構內容，卡片會標「示意資料」徽章）</label>
      <label class="fld hide" id="c-consent-fld">家長書面同意編號（真實學生資料必填 — 個資法）
        <input type="text" id="c-ref" placeholder="例：C-2026-001"></label>
    </div>
    <div class="acts"><button id="c-go">建立草稿（稍後自動產圖）</button></div>
    <p class="muted" id="c-msg"></p>`;

  const typeEl = document.getElementById("c-type");
  const swap = () => {
    const t = typeEl.value;
    document.getElementById("c-form").innerHTML = FORMS[t]();
    document.getElementById("c-consent").classList.toggle("hide", !PII_TYPES.includes(t));
    if (t === "honor_roll") document.getElementById("students").innerHTML = studentRow();
    if (t === "leap_card") document.getElementById("traj").innerHTML = trajRow() + trajRow() + trajRow();
    syncConsent();
  };
  typeEl.addEventListener("change", swap);
  swap();

  document.getElementById("c-sample").addEventListener("change", syncConsent);
  document.getElementById("compose").addEventListener("click", (e) => {
    if (e.target.id === "add-student")
      document.getElementById("students").insertAdjacentHTML("beforeend", studentRow());
    if (e.target.id === "add-traj")
      document.getElementById("traj").insertAdjacentHTML("beforeend", trajRow());
    if (e.target.matches("[data-rm]")) e.target.closest(".row").remove();
  });
  document.getElementById("c-go").addEventListener("click", submit);
}

function syncConsent() {
  const pii = PII_TYPES.includes(document.getElementById("c-type").value);
  const sample = document.getElementById("c-sample").checked;
  document.getElementById("c-consent-fld").classList.toggle("hide", !pii || sample);
}

function payloadOf(t) {
  const v = (p) => (document.querySelector(`[data-p="${p}"]`)?.value || "").trim();
  if (t === "honor_roll") return {
    year_roc: v("year_roc"), headline: v("headline"), note: v("note") || undefined,
    students: [...document.querySelectorAll("[data-student]")].map((r) => ({
      name: r.querySelector('[data-s="name"]').value.trim(),
      school: r.querySelector('[data-s="school"]').value.trim(),
    })).filter((s) => s.name && s.school),
  };
  if (t === "event") return {
    event_name: v("event_name"), date_text: v("date_text"),
    place: v("place") || undefined, cta: v("cta") || undefined, body: v("body") || undefined };
  if (t.startsWith("testimonial")) return {
    quote: v("quote"), attribution: v("attribution"), context: v("context") || undefined };
  if (t === "leap_card") return {
    student: v("student"), subject: v("subject"), period: v("period") || undefined,
    before: Number(v("before")), after: Number(v("after")),
    trajectory: [...document.querySelectorAll("[data-traj]")].map((r) => ({
      label: r.querySelector('[data-t="label"]').value.trim(),
      score: Number(r.querySelector('[data-t="score"]').value),
      level: Number(r.querySelector('[data-t="level"]').value),
    })).filter((p) => p.label),
  };
}

async function submit() {
  const t = document.getElementById("c-type").value;
  const sample = document.getElementById("c-sample").checked;
  const ref = document.getElementById("c-ref")?.value.trim() || null;
  const msg = document.getElementById("c-msg");
  const go = document.getElementById("c-go");
  // Client-side hint only — the DB check constraint is the real gate, and it
  // rejects unconsented real student data even for service_role.
  if (PII_TYPES.includes(t) && !sample && !ref) {
    msg.innerHTML = '<span style="color:var(--danger)">真實學生資料需要家長書面同意編號，或勾選示意資料。</span>';
    return;
  }
  go.disabled = true;
  msg.textContent = "建立中…";
  const { data, error } = await window.sb.from("content_items").insert({
    type: t,
    scheduled_date: document.getElementById("c-date").value,
    title: document.getElementById("c-title").value.trim() || TYPE_LABEL[t],
    caption: document.getElementById("c-caption").value,
    payload: payloadOf(t),
    sample_data: sample,
    consent_ref: ref,
  }).select("id").single();
  go.disabled = false;
  if (error) {
    msg.innerHTML = `<span style="color:var(--danger)">建立失敗：${esc(error.message)}</span>`;
    return;
  }
  msg.textContent = "已建立 ✓ 卡片產生中（約 2–3 分鐘），完成後會出現在佇列。";
  document.querySelector('nav button[data-tab="queue"]').click();
  await loadQueue();
  pollFor(data.id);
}

// The card is rendered by GitHub Actions, so poll until the image lands.
function pollFor(id) {
  clearInterval(POLL);
  let tries = 0;
  POLL = setInterval(async () => {
    if (++tries > 40) return clearInterval(POLL);      // ~5 min then give up
    const { data } = await window.sb.from("content_items")
      .select("image_keys, render_error").eq("id", id).maybeSingle();
    if (data && (data.image_keys?.length || data.render_error)) {
      clearInterval(POLL);
      await loadQueue();
    }
  }, 8000);
}

// ── boot ────────────────────────────────────────────────────────────────────
(async () => {
  await window.authGate();
  if (!window.CURRENT_USER_ROLE) return;            // gate already redirected
  document.getElementById("btn-signout").addEventListener("click", window.signOut);
  document.getElementById("who").textContent =
    `${window.CURRENT_USER.email} · ${window.CURRENT_USER_ROLE}`;
  renderCompose();
  await Promise.all([loadQueue(), loadBank()]);
})();
</script>
</body>
</html>
